abstract: >-
  With rising popularity of LLMs, the performance, scalability, and
  resource-efficiency of inferences become a crucial challenge. The core part of
  the inference process is the KV cache, which avoids recomputing intermediate
  attention states, and the batching strategy that batches multiple requests per
  forward pass to leverage GPU parallelism. KV cache memory grows linearly with
  sequence length and batch sizes, easily exceeding the limited GPU memory
  capacity. State-of-the-art inference runtimes use continuous batching to
  maximize GPU utilization by interleaving the processing of new requests (i.e.,
  prefill requests) with ongoing generation requests (i.e., decode requests).
  However, existing schedulers greedily admit prefill requests without
  considering the future KV cache memory required to successfully run the decode
  phases. This shortsighted approach causes frequent KV cache overflows, which
  in turn trigger preemption and recomputation of requests, severely degrading
  both throughput and latency. We propose PKAS, a Predictive KV Cache-Aware
  Scheduling algorithm to mitigate this inefficiency by reducing preemptions.
  PKAS uses a low-overhead technique to simulate future KV cache utilization and
  guide the admissibility for new request candidates. Combined with lightweight
  output-length predictions, PKAS can make better batching decisions, preventing
  KV cache overflows and drastically reducing preemptions. Evaluations on
  diverse models and workloads show that PKAS achieves up to 7.34x higher
  throughput and 8x lower latency compared to state-of-the-art scheduling, with
  the largest gains on long-context workloads where KV cache pressure is high.

advisor: Dr. Xian-He Sun
bio: >-
  Shazzadul Islam is a PhD student in the Department of Computer Science at
  the Illinois Institute of Technology and a member of the Gnosis Research Center.
  His research focuses on AI-driven scientific workflows and agentic systems for
  scientific computing. He holds an M.S. in Computer Science from
  the Illinois Institute of Technology in Chicago. Shazzadul Islam works under the
  guidance of Dr. Xian-He Sun.
